<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 시스템 (Firebase 연동 완료)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        /* 디자인 스타일 설정 */
        body { font-family: 'Malgun Gothic', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f4f4f9; }
        .container { background-color: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); text-align: center; width: 340px; }
        button { width: 100%; padding: 10px; margin: 10px 0; border: none; border-radius: 5px; background-color: #007bff; color: white; font-size: 16px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        .bulk-btn { background-color: #28a745; } .bulk-btn:hover { background-color: #218838; }
        .delete-btn { background-color: #dc3545; } .delete-btn:hover { background-color: #c82333; }
        .secondary-btn { background-color: #6c757d; } .secondary-btn:hover { background-color: #5a6268; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .page { display: none; } .active { display: block; }
        .list-container { max-height: 250px; overflow-y: auto; margin-bottom: 15px; padding-right: 5px; }
        .list-header { display: flex; gap: 5px; margin-bottom: 10px; font-weight: bold; font-size: 13px; color: #555; text-align: center; }
        .list-header .h-id { flex: 2; } .list-header .h-pw { flex: 2; } .list-header .h-btn { flex: 2; }
        .account-item { display: flex; gap: 5px; margin-bottom: 10px; align-items: center; }
        .account-item input { flex: 2; margin: 0; padding: 8px 5px; font-size: 12px; text-align: center; }
        .account-item button { flex: 1; margin: 0; padding: 8px 0; font-size: 12px; }
        .edit-btn { background-color: #28a745; } .edit-btn:hover { background-color: #218838; }
        .lobby-title { color: #28a745; font-weight: bold; font-size: 22px; margin-top: 0; }
        .welcome-text { font-size: 16px; font-weight: bold; color: #333; margin-bottom: 20px; }
        .online-users-container { background-color: #f8f9fa; border: 1px solid #ddd; border-radius: 5px; padding: 15px; margin: 20px 0; text-align: left; max-height: 200px; overflow-y: auto; }
        .online-users-title { font-size: 14px; font-weight: bold; margin-bottom: 10px; color: #333; border-bottom: 1px solid #ccc; padding-bottom: 5px; }
        
        /* === 수정된 로비 접속자 디자인 === */
        #online-users-list { display: flex; flex-wrap: wrap; gap: 20px; padding-top: 10px; justify-content: center; }
        .online-user-item { display: flex; flex-direction: column; align-items: center; font-size: 13px; color: #333; margin: 0; }
        .online-user-avatar { height: 50px; width: auto; margin-bottom: 5px; border: none; background: transparent; }
        
        /* === 수정된 보관함 아바타 디자인 === */
        .avatar-list-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 20px; max-height: 300px; overflow-y: auto; padding: 5px; }
        .avatar-item { border: 2px solid transparent; border-radius: 10px; padding: 10px; cursor: pointer; text-align: center; background-color: #f8f9fa; box-sizing: border-box; }
        .avatar-item img { height: 70px; width: auto; } /* 세로 크기 고정, 가로 비율 자동 맞춤 */
        .avatar-item.selected { border-color: #007bff; background-color: #e6f7ff; }
    </style>
</head>
<body>

    <div class="container">
        <div id="main-page" class="page active">
            <h2>메인 화면</h2>
            <button onclick="showPage('student-page')">학생 로그인</button>
            <button onclick="showPage('admin-login-page')">관리자 로그인</button>
        </div>

        <div id="student-page" class="page">
            <h2>학생 로그인</h2>
            <input type="text" id="student-id" placeholder="학생 아이디">
            <input type="password" id="student-pw" placeholder="학생 비밀번호">
            <button onclick="checkStudentLogin()">로그인</button>
            <button class="secondary-btn" onclick="showPage('main-page')">처음으로</button>
        </div>

        <div id="admin-login-page" class="page">
            <h2>관리자 로그인</h2>
            <input type="text" id="admin-id" placeholder="관리자 아이디">
            <input type="password" id="admin-pw" placeholder="관리자 비밀번호">
            <button onclick="checkAdminLogin()">로그인</button>
            <button class="secondary-btn" onclick="showPage('main-page')">처음으로</button>
        </div>

        <div id="admin-menu-page" class="page">
            <h2>관리자 메뉴</h2>
            <button onclick="showPage('student-create-page')">학생 계정 생성</button>
            <button onclick="showManagePage()">학생 계정 수정</button>
            <button class="secondary-btn" onclick="showPage('main-page')">로그아웃 (처음으로)</button>
        </div>

        <div id="student-create-page" class="page">
            <h2>학생 계정 생성</h2>
            <input type="text" id="new-student-id" placeholder="생성할 아이디">
            <input type="password" id="new-student-pw" placeholder="생성할 비밀번호">
            <button onclick="createStudentAccount()">계정 생성</button>
            <button class="bulk-btn" onclick="document.getElementById('excel-file-input').click()">학생 계정 일괄 생성</button>
            <input type="file" id="excel-file-input" accept=".xlsx, .xls" style="display:none;" onchange="handleExcelUpload(event)">
            <button class="secondary-btn" onclick="showPage('admin-menu-page')">이전으로</button>
        </div>

        <div id="student-manage-page" class="page">
            <h2>학생 계정 목록</h2>
            <div id="student-list" class="list-container"></div>
            <button class="delete-btn" onclick="deleteAllAccounts()">학생 계정 일괄 삭제</button>
            <button class="secondary-btn" onclick="showPage('admin-menu-page')">이전으로</button>
        </div>

        <div id="student-lobby-page" class="page">
            <h2 class="lobby-title">🎉 메인 로비</h2>
            <div class="welcome-text" id="welcome-message"></div>
            <div class="online-users-container">
                <div class="online-users-title">🟢 현재 접속 중인 학생 및 아바타</div>
                <div id="online-users-list"></div>
            </div>
            <button id="storage-btn" onclick="showStoragePage()">보관함</button>
            <button class="secondary-btn" onclick="logoutStudent()">로그아웃 (처음으로)</button>
        </div>

        <div id="storage-page" class="page">
            <h2>아바타 보관함</h2>
            <p style="font-size: 14px; color: #555; margin-bottom: 20px;">원하는 아바타를 선택해주세요.</p>
            <div id="avatar-list" class="avatar-list-container"></div>
            <button class="secondary-btn" onclick="showPage('student-lobby-page')">이전으로</button>
        </div>
    </div>

    <script>
        // 파이어베이스 개인 설정 적용 완료
        const firebaseConfig = {
            apiKey: "AIzaSyAs5o4rlC1-bhA4J0P8LXp54CzDQ_aRNCo",
            authDomain: "shkit-300c7.firebaseapp.com",
            projectId: "shkit-300c7",
            storageBucket: "shkit-300c7.firebasestorage.app",
            messagingSenderId: "233422083288",
            appId: "1:233422083288:web:2943bf7fdcc1c64ab333ad",
            measurementId: "G-3X7SHWR081",
            databaseURL: "https://shkit-300c7-default-rtdb.firebaseio.com" 
        };

        // 파이어베이스 초기화
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const DEFAULT_AVATARS = ['image_0.png', 'image_1.png'];
        let currentUser = null;
        let myCurrentAvatar = null;
        let localStudentAccounts = {}; 
        let localOnlineUsers = {}; 

        // === 수정됨: 조건문 없이 항상 백그라운드 갱신 적용 ===
        db.ref('studentAccounts').on('value', (snapshot) => {
            localStudentAccounts = snapshot.val() || {};
            renderStudentList();
        });

        db.ref('onlineUsers').on('value', (snapshot) => {
            localOnlineUsers = snapshot.val() || {};
            renderOnlineUsers();
        });
        // =======================================================

        function showPage(pageId) {
            const pages = document.querySelectorAll('.page');
            pages.forEach(page => page.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');

            if (pageId === 'admin-login-page') {
                document.getElementById('admin-id').value = ''; document.getElementById('admin-pw').value = '';
            } else if (pageId === 'student-page') {
                document.getElementById('student-id').value = ''; document.getElementById('student-pw').value = '';
            } else if (pageId === 'student-create-page') {
                document.getElementById('new-student-id').value = ''; document.getElementById('new-student-pw').value = '';
            }
        }

        function checkAdminLogin() {
            const inputId = document.getElementById('admin-id').value;
            const inputPw = document.getElementById('admin-pw').value;
            if (inputId === 'sanghwa1001' && inputPw === 'tkdghk2441?') {
                showPage('admin-menu-page');
            } else {
                alert('관리자 정보가 일치하지 않습니다.');
            }
        }

        function createStudentAccount() {
            const newId = document.getElementById('new-student-id').value.trim();
            const newPw = document.getElementById('new-student-pw').value.trim();

            if (newId === '' || newPw === '') return alert('아이디와 비밀번호를 모두 입력해주세요.');
            if (localStudentAccounts[newId]) return alert('이미 존재하는 아이디입니다.');

            db.ref('studentAccounts/' + newId).set({
                pw: newPw,
                avatarId: DEFAULT_AVATARS[0]
            });
            
            alert(`학생 계정(${newId})이 생성되었습니다!`);
            showPage('admin-menu-page');
        }

        function handleExcelUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1 });
                
                let successCount = 0; let duplicateCount = 0;
                let updates = {};

                for (let i = 0; i < rows.length; i++) {
                    const row = rows[i];
                    if (!row || row[0] === undefined || row[1] === undefined) continue;

                    const id = String(row[0]).trim(); const pw = String(row[1]).trim();
                    if (id === '' || pw === '' || id === '아이디' || id.toLowerCase() === 'id') continue;

                    if (localStudentAccounts[id]) { duplicateCount++; continue; }

                    updates[id] = { pw: pw, avatarId: DEFAULT_AVATARS[0] };
                    successCount++;
                }

                if (successCount > 0) {
                    db.ref('studentAccounts').update(updates);
                }
                
                alert(`일괄 등록 완료!\n생성: ${successCount}개\n중복 제외: ${duplicateCount}개`);
                event.target.value = ''; showPage('admin-menu-page');
            };
            reader.readAsArrayBuffer(file);
        }

        function showManagePage() {
            renderStudentList();
            showPage('student-manage-page');
        }

        function renderStudentList() {
            const listDiv = document.getElementById('student-list');
            listDiv.innerHTML = '';
            const ids = Object.keys(localStudentAccounts);

            if (ids.length === 0) {
                listDiv.innerHTML = '<p style="color: #888; font-size: 14px;">생성된 학생 계정이 없습니다.</p>'; return;
            }

            listDiv.innerHTML = `<div class="list-header"><div class="h-id">아이디</div><div class="h-pw">비밀번호</div><div class="h-btn">관리</div></div>`;

            ids.forEach((id) => {
                const account = localStudentAccounts[id];
                const itemDiv = document.createElement('div');
                itemDiv.className = 'account-item';
                itemDiv.innerHTML = `
                    <input type="text" id="edit-id-${id}" value="${id}" readonly style="background:#eee;">
                    <input type="text" id="edit-pw-${id}" value="${account.pw}" placeholder="비밀번호">
                    <button class="edit-btn" onclick="updateAccount('${id}')">수정</button>
                    <button class="delete-btn" onclick="deleteAccount('${id}')">삭제</button>
                `;
                listDiv.appendChild(itemDiv);
            });
        }

        function updateAccount(id) {
            const newPw = document.getElementById(`edit-pw-${id}`).value.trim();
            if (newPw === '') return alert('비밀번호를 입력해주세요.');

            db.ref('studentAccounts/' + id).update({ pw: newPw });
            alert('비밀번호가 성공적으로 수정되었습니다.');
        }

        function deleteAccount(id) {
            if (localOnlineUsers[id]) return alert('현재 접속 중인 학생은 삭제할 수 없습니다.');
            if (confirm('정말 삭제하시겠습니까?')) {
                db.ref('studentAccounts/' + id).remove();
            }
        }

        function deleteAllAccounts() {
            if (Object.keys(localStudentAccounts).length === 0) return alert('삭제할 계정이 없습니다.');
            if (Object.keys(localOnlineUsers).length > 0) return alert('접속 중인 학생이 있어 삭제할 수 없습니다.');
            if (confirm('⚠️ 모든 학생 계정을 삭제하시겠습니까?')) {
                db.ref('studentAccounts').remove();
            }
        }

        function checkStudentLogin() {
            const inputId = document.getElementById('student-id').value.trim();
            const inputPw = document.getElementById('student-pw').value.trim();

            const account = localStudentAccounts[inputId];

            if (account && account.pw === inputPw) {
                currentUser = inputId;
                myCurrentAvatar = account.avatarId || DEFAULT_AVATARS[0];
                document.getElementById('welcome-message').innerText = `${inputId}님, 반갑습니다! 🥳`;
                
                const myOnlineRef = db.ref('onlineUsers/' + currentUser);
                myOnlineRef.set({ avatarId: myCurrentAvatar });
                myOnlineRef.onDisconnect().remove(); 

                showPage('student-lobby-page');
                renderOnlineUsers(); 
            } else {
                alert('아이디 또는 비밀번호가 틀렸습니다.');
            }
        }

        function logoutStudent() {
            if (currentUser) {
                db.ref('onlineUsers/' + currentUser).remove();
                currentUser = null;
            }
            showPage('main-page');
        }

        function renderOnlineUsers() {
            const listDiv = document.getElementById('online-users-list');
            listDiv.innerHTML = '';
            const ids = Object.keys(localOnlineUsers);
            
            if (ids.length === 0) {
                listDiv.innerHTML = '<p style="color: #888; font-size: 13px;">현재 접속 중인 학생이 없습니다.</p>'; return;
            }

            ids.forEach(id => {
                const user = localOnlineUsers[id];
                const userDiv = document.createElement('div');
                userDiv.className = 'online-user-item';
                const isMe = (id === currentUser) ? '<span style="color: #007bff; font-weight:bold;">(나)</span>' : '';
                userDiv.innerHTML = `<img src="${user.avatarId}" alt="아바타" class="online-user-avatar"><span>${id} ${isMe}</span>`;
                listDiv.appendChild(userDiv);
            });
        }

        function showStoragePage() { renderAvatarList(); showPage('storage-page'); }

        function renderAvatarList() {
            const listDiv = document.getElementById('avatar-list');
            listDiv.innerHTML = '';
            
            DEFAULT_AVATARS.forEach(avatarId => {
                const avatarDiv = document.createElement('div');
                avatarDiv.className = 'avatar-item';
                if (avatarId === myCurrentAvatar) avatarDiv.classList.add('selected');
                
                avatarDiv.onclick = () => changeAvatar(avatarId);
                const avatarName = (avatarId === 'image_0.png') ? '남자 아바타' : '여자 아바타';
                avatarDiv.innerHTML = `<img src="${avatarId}" alt="아바타"><p style="font-size: 12px; color: #333; margin-top: 10px;">${avatarName}</p>`;
                listDiv.appendChild(avatarDiv);
            });
        }

        function changeAvatar(newAvatarId) {
            myCurrentAvatar = newAvatarId;
            db.ref('studentAccounts/' + currentUser).update({ avatarId: newAvatarId });
            db.ref('onlineUsers/' + currentUser).update({ avatarId: newAvatarId });
            
            renderAvatarList();
            alert('아바타가 성공적으로 변경되었습니다!');
        }
    </script>
</body>
</html>
