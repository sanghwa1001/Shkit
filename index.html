<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아바타 월드 로그인 (와이드 게임 UI 버전)</title>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <style>
        /* === 게임 스타일 전체 레이아웃 === */
        body { 
            font-family: 'Jua', sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; 
            background: linear-gradient(135deg, #74ebd5 0%, #9face6 100%);
        }
        
        /* 큼직해진 메인 게임 팝업창 */
        .container { 
            background-color: #ffffff; 
            padding: 40px; 
            border: 5px solid #333; 
            border-radius: 25px; 
            box-shadow: 0 12px 0 rgba(0,0,0,0.2); 
            text-align: center; 
            width: 90%; /* 화면 꽉 차게 변경 */
            max-width: 650px; /* 기존 350px에서 대폭 확장 */
            box-sizing: border-box;
        }

        h2 { color: #333; margin-top: 0; margin-bottom: 25px; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); font-size: 36px; }

        /* === 큼직한 3D 게임 버튼 === */
        button { 
            font-family: 'Jua', sans-serif;
            width: 100%; padding: 15px; margin: 10px 0; 
            border: 3px solid #0056b3; 
            border-radius: 15px; 
            background-color: #007bff; 
            color: white; font-size: 22px; cursor: pointer; 
            box-shadow: 0 6px 0 #004494; 
            transition: all 0.1s ease; 
            letter-spacing: 2px;
        }
        button:active { 
            transform: translateY(6px); 
            box-shadow: 0 0 0 #004494; 
        }
        
        .bulk-btn { background-color: #28a745; border-color: #1e7e34; box-shadow: 0 6px 0 #155724; }
        .delete-btn { background-color: #dc3545; border-color: #bd2130; box-shadow: 0 6px 0 #8b1c24; }
        .secondary-btn { background-color: #6c757d; border-color: #545b62; box-shadow: 0 6px 0 #3d4246; }
        .edit-btn { background-color: #28a745; border-color: #1e7e34; box-shadow: 0 4px 0 #155724; padding: 10px; font-size: 16px;}
        
        /* 더 크고 입력하기 편해진 입력창 */
        input { 
            font-family: 'Jua', sans-serif;
            width: 100%; padding: 15px; margin: 10px 0; 
            border: 3px solid #ddd; 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-size: 20px;
            background-color: #f9f9f9;
            transition: border-color 0.3s;
        }
        input:focus { outline: none; border-color: #007bff; background-color: #fff; }

        .page { display: none; } .active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* === 확장된 목록 디자인 === */
        .list-container { 
            max-height: 400px; /* 더 많이 보이게 세로 길이 확장 */
            overflow-y: auto; margin-bottom: 20px; padding-right: 10px; 
            background: #f8f9fa; border: 3px dashed #ccc; border-radius: 15px; padding: 15px;
        }
        .list-container::-webkit-scrollbar { width: 10px; }
        .list-container::-webkit-scrollbar-thumb { background: #bbb; border-radius: 5px; }
        
        .list-header { display: flex; gap: 10px; margin-bottom: 15px; font-size: 18px; color: #555; text-align: center; border-bottom: 2px solid #ddd; padding-bottom: 10px;}
        .list-header .h-id { flex: 2; } .list-header .h-pw { flex: 2; } .list-header .h-btn { flex: 2; }
        
        .account-item { display: flex; gap: 10px; margin-bottom: 12px; align-items: center; background: white; padding: 8px; border-radius: 10px; border: 2px solid #eee;}
        .account-item input { flex: 2; margin: 0; padding: 10px; font-size: 16px; text-align: center; border-width: 2px;}
        .account-item button { flex: 1; margin: 0; font-size: 16px; }
        
        /* === 시원해진 로비 화면 디자인 === */
        .lobby-title { color: #ff9800; font-size: 44px; margin-top: 0; text-shadow: 2px 2px 0px #ffe0b2; }
        .welcome-text { font-size: 26px; color: #333; margin-bottom: 25px; background: #fff3cd; padding: 15px; border-radius: 12px; border: 3px solid #ffeeba;}
        
        .online-users-container { background-color: #e3f2fd; border: 3px solid #90caf9; border-radius: 15px; padding: 20px; margin: 25px 0; max-height: 300px; overflow-y: auto; }
        .online-users-title { font-size: 22px; margin-bottom: 15px; color: #1565c0; border-bottom: 2px dashed #90caf9; padding-bottom: 10px; text-align: left;}
        #online-users-list { display: flex; flex-wrap: wrap; gap: 20px; padding-top: 10px; justify-content: center; }
        .online-user-item { display: flex; flex-direction: column; align-items: center; font-size: 18px; color: #333; background: white; padding: 10px; border-radius: 12px; border: 2px solid #bbdefb; box-shadow: 0 3px 0 #bbdefb;}
        .online-user-avatar { height: 90px; width: auto; margin-bottom: 8px; }
        
        /* === 넓은 공간을 꽉 채우는 반응형 아바타 그리드 === */
        .avatar-list-container { 
            display: grid; 
            /* 화면이 넓어지면 자동으로 3~4칸으로 늘어납니다! */
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); 
            gap: 15px; margin-bottom: 25px; max-height: 450px; overflow-y: auto; padding: 10px; 
        }
        .avatar-item { 
            border: 3px solid #eee; border-radius: 15px; padding: 15px; text-align: center; 
            background-color: white; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            position: relative; cursor: pointer; transition: transform 0.2s;
        }
        .avatar-item:hover { transform: scale(1.05); }
        .avatar-item img { height: 110px; width: auto; margin-bottom: 12px; filter: drop-shadow(0 4px 4px rgba(0,0,0,0.1));}
        
        .avatar-item.selected { border-color: #ff9800; background-color: #fff3e0; box-shadow: 0 0 12px rgba(255,152,0,0.6); }
        
        .buy-btn { width: 100%; padding: 10px; font-size: 16px; margin: 10px 0 0 0; background-color: #17a2b8; border-color: #117a8b; box-shadow: 0 4px 0 #0f6674; border-radius: 10px;}
        .buy-btn:active { transform: translateY(4px); box-shadow: 0 0 0 #0f6674; }
        .owned-tag { font-size: 16px; color: #fff; background: #888; border-radius: 8px; padding: 6px 12px; margin-top: 10px; }
        
        /* 커진 학생 보석 표시 UI */
        .gem-display { font-size: 24px; color: #d84315; background: #ffcc80; padding: 12px 25px; border-radius: 25px; display: inline-block; margin-bottom: 20px; border: 3px solid #ffb74d; box-shadow: 0 4px 0 #ff9800;}
    </style>
</head>
<body>

    <div class="container">
        <div id="main-page" class="page active">
            <h2>🎮 로그인 화면</h2>
            <button onclick="showPage('student-page')">학생 로그인</button>
            <button class="secondary-btn" onclick="showPage('admin-login-page')">관리자 로그인</button>
        </div>

        <div id="student-page" class="page">
            <h2>학생 로그인</h2>
            <input type="text" id="student-id" placeholder="학생 아이디">
            <input type="password" id="student-pw" placeholder="학생 비밀번호">
            <button onclick="checkStudentLogin()">접속하기!</button>
            <button class="secondary-btn" onclick="showPage('main-page')">처음으로</button>
        </div>

        <div id="admin-login-page" class="page">
            <h2>관리자 로그인</h2>
            <input type="text" id="admin-id" placeholder="관리자 아이디">
            <input type="password" id="admin-pw" placeholder="관리자 비밀번호">
            <button onclick="checkAdminLogin()">로그인</button>
            <button class="secondary-btn" onclick="showPage('main-page')">처음으로</button>
        </div>

        <div id="admin-menu-page" class="page">
            <h2>🛠️ 관리자 메뉴</h2>
            <button onclick="showPage('student-create-page')">학생 계정 생성</button>
            <button onclick="showManagePage()">학생 계정 수정</button>
            <button onclick="showAdminShopPage()" style="background-color: #ff9800; border-color:#e65100; box-shadow: 0 6px 0 #bf360c;">상점 관리</button>
            <button class="secondary-btn" onclick="showPage('main-page')">로그아웃</button>
        </div>

        <div id="student-create-page" class="page">
            <h2>계정 만들기</h2>
            <input type="text" id="new-student-id" placeholder="생성할 아이디">
            <input type="password" id="new-student-pw" placeholder="생성할 비밀번호">
            <button onclick="createStudentAccount()">계정 생성</button>
            <button class="bulk-btn" onclick="document.getElementById('excel-file-input').click()">엑셀로 일괄 생성</button>
            <input type="file" id="excel-file-input" accept=".xlsx, .xls" style="display:none;" onchange="handleExcelUpload(event)">
            <button class="secondary-btn" onclick="showPage('admin-menu-page')">이전으로</button>
        </div>

        <div id="student-manage-page" class="page">
            <h2>학생 목록</h2>
            <div id="student-list" class="list-container"></div>
            <button class="delete-btn" onclick="deleteAllAccounts()">전체 삭제</button>
            <button class="secondary-btn" onclick="showPage('admin-menu-page')">이전으로</button>
        </div>

        <div id="admin-shop-page" class="page">
            <h2>상점 관리</h2>
            <p style="font-size: 18px; color: #666; margin-bottom: 15px;">✏️이름 / 💎가격을 수정하고<br>판매할 아바타를 클릭하세요!</p>
            <div id="admin-shop-list" class="avatar-list-container"></div>
            <button class="bulk-btn" onclick="saveShopItems()">저장하고 판매하기</button>
            <button class="secondary-btn" onclick="showPage('admin-menu-page')">이전으로</button>
        </div>

        <div id="student-lobby-page" class="page">
            <h2 class="lobby-title">🎉 메인 로비 🎉</h2>
            <div class="welcome-text" id="welcome-message"></div>
            <div class="online-users-container">
                <div class="online-users-title">🟢 접속 중인 친구들</div>
                <div id="online-users-list"></div>
            </div>
            <button id="shop-btn" onclick="showStudentShopPage()" style="background-color: #ff9800; border-color:#e65100; box-shadow: 0 6px 0 #bf360c;">💎 아바타 상점</button>
            <button id="storage-btn" onclick="showStoragePage()">🎒 내 보관함</button>
            <button class="secondary-btn" onclick="logoutStudent()">로그아웃</button>
        </div>

        <div id="student-shop-page" class="page">
            <h2>💎 아바타 상점</h2>
            <div id="my-gems-display" class="gem-display">내 보석: 💎 0</div>
            <div id="student-shop-list" class="avatar-list-container"></div>
            <button class="secondary-btn" onclick="showPage('student-lobby-page')">이전으로</button>
        </div>

        <div id="storage-page" class="page">
            <h2>🎒 아바타 보관함</h2>
            <p style="font-size: 18px; color: #555;">장착할 아바타를 고르세요!</p>
            <div id="avatar-list" class="avatar-list-container"></div>
            <button class="bulk-btn" onclick="applySelectedAvatar()">장착하기</button>
            <button class="secondary-btn" onclick="showPage('student-lobby-page')">이전으로</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAs5o4rlC1-bhA4J0P8LXp54CzDQ_aRNCo",
            authDomain: "shkit-300c7.firebaseapp.com",
            projectId: "shkit-300c7",
            storageBucket: "shkit-300c7.firebasestorage.app",
            messagingSenderId: "233422083288",
            appId: "1:233422083288:web:2943bf7fdcc1c64ab333ad",
            measurementId: "G-3X7SHWR081",
            databaseURL: "https://shkit-300c7-default-rtdb.firebaseio.com" 
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const DEFAULT_AVATARS = ['image_0.png', 'image_1.png'];
        const ALL_SHOP_AVATARS = ['1.png', '2.png', '3.png', '4.png', '5.png', '6.png', '7.png', '8.png', '9.png', '10.png'];
        
        let currentUser = null;
        let myCurrentAvatar = null;
        let tempSelectedAvatar = null; 

        let tempShopItems = [];

        let localStudentAccounts = {}; 
        let localOnlineUsers = {}; 
        let localShopItems = []; 
        let localShopNames = {}; 
        let localShopPrices = {}; 

        db.ref('studentAccounts').on('value', (snapshot) => {
            localStudentAccounts = snapshot.val() || {};
            if (document.getElementById('student-manage-page').classList.contains('active')) renderStudentList();
            if (document.getElementById('student-shop-page').classList.contains('active')) renderStudentShop();
        });

        db.ref('onlineUsers').on('value', (snapshot) => {
            localOnlineUsers = snapshot.val() || {};
            renderOnlineUsers();
        });

        db.ref('shopItems').on('value', (snapshot) => {
            localShopItems = snapshot.val() || [];
            if (document.getElementById('admin-shop-page').classList.contains('active')) renderAdminShopPage();
            if (document.getElementById('student-shop-page').classList.contains('active')) renderStudentShop();
        });

        db.ref('shopItemNames').on('value', (snapshot) => {
            localShopNames = snapshot.val() || {};
            if (document.getElementById('admin-shop-page').classList.contains('active')) renderAdminShopPage();
            if (document.getElementById('student-shop-page').classList.contains('active')) renderStudentShop();
            if (document.getElementById('storage-page').classList.contains('active')) renderAvatarList();
        });

        db.ref('shopItemPrices').on('value', (snapshot) => {
            localShopPrices = snapshot.val() || {};
            if (document.getElementById('admin-shop-page').classList.contains('active')) renderAdminShopPage();
            if (document.getElementById('student-shop-page').classList.contains('active')) renderStudentShop();
        });

        function showPage(pageId) {
            const pages = document.querySelectorAll('.page');
            pages.forEach(page => page.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');

            if (pageId === 'admin-login-page') {
                document.getElementById('admin-id').value = ''; document.getElementById('admin-pw').value = '';
            } else if (pageId === 'student-page') {
                document.getElementById('student-id').value = ''; document.getElementById('student-pw').value = '';
            } else if (pageId === 'student-create-page') {
                document.getElementById('new-student-id').value = ''; document.getElementById('new-student-pw').value = '';
            }
        }

        function checkAdminLogin() {
            const inputId = document.getElementById('admin-id').value.trim();
            const inputPw = document.getElementById('admin-pw').value.trim();

            if (inputId === '' || inputPw === '') {
                alert('아이디와 비밀번호를 모두 입력해주세요.');
                return;
            }

            const adminEmail = inputId + "@gmail.com";

            firebase.auth().signInWithEmailAndPassword(adminEmail, inputPw)
                .then((userCredential) => {
                    showPage('admin-menu-page');
                })
                .catch((error) => {
                    alert('관리자 정보가 일치하지 않습니다.');
                    console.error("로그인 에러:", error);
                });
        }

        function createStudentAccount() {
            const newId = document.getElementById('new-student-id').value.trim();
            const newPw = document.getElementById('new-student-pw').value.trim();
            if (newId === '' || newPw === '') return alert('아이디와 비밀번호를 모두 입력해주세요.');
            if (localStudentAccounts[newId]) return alert('이미 존재하는 아이디입니다.');

            db.ref('studentAccounts/' + newId).set({
                pw: newPw,
                avatarId: DEFAULT_AVATARS[0],
                ownedAvatars: DEFAULT_AVATARS,
                gems: 10 
            });
            alert(`학생 계정(${newId})이 생성되었습니다! (기본 10보석 지급)`);
            showPage('admin-menu-page');
        }

        function handleExcelUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1 });
                
                let successCount = 0; let duplicateCount = 0;
                let updates = {};

                for (let i = 0; i < rows.length; i++) {
                    const row = rows[i];
                    if (!row || row[0] === undefined || row[1] === undefined) continue;
                    const id = String(row[0]).trim(); const pw = String(row[1]).trim();
                    if (id === '' || pw === '' || id === '아이디' || id.toLowerCase() === 'id') continue;
                    if (localStudentAccounts[id]) { duplicateCount++; continue; }

                    updates[id] = { pw: pw, avatarId: DEFAULT_AVATARS[0], ownedAvatars: DEFAULT_AVATARS, gems: 10 };
                    successCount++;
                }

                if (successCount > 0) db.ref('studentAccounts').update(updates);
                alert(`일괄 등록 완료!\n생성: ${successCount}개\n중복 제외: ${duplicateCount}개`);
                event.target.value = ''; showPage('admin-menu-page');
            };
            reader.readAsArrayBuffer(file);
        }

        function showManagePage() {
            renderStudentList();
            showPage('student-manage-page');
        }

        function renderStudentList() {
            const listDiv = document.getElementById('student-list');
            listDiv.innerHTML = '';
            const ids = Object.keys(localStudentAccounts);
            if (ids.length === 0) {
                listDiv.innerHTML = '<p style="color: #888; font-size: 18px;">생성된 학생 계정이 없습니다.</p>'; return;
            }
            listDiv.innerHTML = `<div class="list-header"><div class="h-id">아이디</div><div class="h-pw">비밀번호</div><div class="h-btn">관리</div></div>`;
            ids.forEach((id) => {
                const account = localStudentAccounts[id];
                const itemDiv = document.createElement('div');
                itemDiv.className = 'account-item';
                itemDiv.innerHTML = `
                    <input type="text" value="${id}" readonly style="background:#eee;">
                    <input type="text" id="edit-pw-${id}" value="${account.pw}" placeholder="비밀번호">
                    <button class="edit-btn" onclick="updateAccount('${id}')">수정</button>
                    <button class="delete-btn" onclick="deleteAccount('${id}')">삭제</button>
                `;
                listDiv.appendChild(itemDiv);
            });
        }

        function updateAccount(id) {
            const newPw = document.getElementById(`edit-pw-${id}`).value.trim();
            if (newPw === '') return alert('비밀번호를 입력해주세요.');
            db.ref('studentAccounts/' + id).update({ pw: newPw });
            alert('비밀번호가 성공적으로 수정되었습니다.');
        }

        function deleteAccount(id) {
            if (localOnlineUsers[id]) return alert('현재 접속 중인 학생은 삭제할 수 없습니다.');
            if (confirm('정말 삭제하시겠습니까?')) db.ref('studentAccounts/' + id).remove();
        }

        function deleteAllAccounts() {
            if (Object.keys(localStudentAccounts).length === 0) return alert('삭제할 계정이 없습니다.');
            if (Object.keys(localOnlineUsers).length > 0) return alert('접속 중인 학생이 있어 삭제할 수 없습니다.');
            if (confirm('⚠️ 모든 학생 계정을 삭제하시겠습니까?')) db.ref('studentAccounts').remove();
        }

        function showAdminShopPage() {
            tempShopItems = [...localShopItems];
            renderAdminShopPage();
            showPage('admin-shop-page');
        }

        function renderAdminShopPage() {
            const listDiv = document.getElementById('admin-shop-list');
            listDiv.innerHTML = '';

            ALL_SHOP_AVATARS.forEach((avatarId, index) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'avatar-item';
                
                if (tempShopItems.includes(avatarId)) {
                    itemDiv.classList.add('selected');
                }

                const dbKey = avatarId.replace('.', '_');
                const currentName = localShopNames[dbKey] || `아바타 ${index + 1}`;
                const currentPrice = localShopPrices[dbKey] !== undefined ? localShopPrices[dbKey] : 1;
                
                itemDiv.innerHTML = `
                    <img src="${avatarId}" alt="아바타">
                    
                    <div id="view-name-mode-${index}" style="margin-top: 8px; display:flex; align-items:center; gap:5px; justify-content:center;">
                        <span style="font-size: 18px; color: #333;">${currentName}</span>
                        <span title="이름 수정" style="cursor: pointer; font-size: 16px; background: #eee; padding: 4px 8px; border-radius: 8px;" onclick="enableEditMode(event, ${index}, 'name')">✏️</span>
                    </div>
                    <div id="edit-name-mode-${index}" style="margin-top: 8px; display:none; align-items:center; gap:5px; justify-content:center;">
                        <input type="text" id="name-input-${index}" value="${currentName}" style="width: 100px; padding: 6px; font-size: 16px; text-align: center; border: 2px solid #ccc; border-radius: 8px;" onclick="event.stopPropagation();" onkeypress="handleEnter(event, '${avatarId}', ${index}, 'name')">
                        <span title="저장" style="cursor: pointer; font-size: 16px; background: #d4edda; color: #155724; padding: 4px 8px; border-radius: 8px;" onclick="saveSingleData(event, '${avatarId}', ${index}, 'name')">✔️</span>
                    </div>

                    <div id="view-price-mode-${index}" style="margin-top: 8px; margin-bottom: 8px; display:flex; align-items:center; gap:5px; justify-content:center;">
                        <span style="font-size: 18px; color: #d84315;">💎 ${currentPrice}</span>
                        <span title="가격 수정" style="cursor: pointer; font-size: 16px; background: #eee; padding: 4px 8px; border-radius: 8px;" onclick="enableEditMode(event, ${index}, 'price')">💎</span>
                    </div>
                    <div id="edit-price-mode-${index}" style="margin-top: 8px; margin-bottom: 8px; display:none; align-items:center; gap:5px; justify-content:center;">
                        <input type="number" id="price-input-${index}" value="${currentPrice}" min="0" style="width: 60px; padding: 6px; font-size: 16px; text-align: center; border: 2px solid #ccc; border-radius: 8px;" onclick="event.stopPropagation();" onkeypress="handleEnter(event, '${avatarId}', ${index}, 'price')">
                        <span title="저장" style="cursor: pointer; font-size: 16px; background: #d4edda; color: #155724; padding: 4px 8px; border-radius: 8px;" onclick="saveSingleData(event, '${avatarId}', ${index}, 'price')">✔️</span>
                    </div>
                `;
                
                itemDiv.onclick = (e) => {
                    if(e.target.tagName !== 'INPUT' && e.target.tagName !== 'SPAN') {
                        if (tempShopItems.includes(avatarId)) {
                            tempShopItems = tempShopItems.filter(id => id !== avatarId);
                        } else {
                            tempShopItems.push(avatarId);
                        }
                        renderAdminShopPage(); 
                    }
                };
                listDiv.appendChild(itemDiv);
            });
        }

        function enableEditMode(event, index, type) {
            event.stopPropagation();
            document.getElementById(`view-${type}-mode-${index}`).style.display = 'none';
            const editMode = document.getElementById(`edit-${type}-mode-${index}`);
            editMode.style.display = 'flex';
            document.getElementById(`${type}-input-${index}`).focus(); 
        }

        function saveSingleData(event, avatarId, index, type) {
            event.stopPropagation();
            const inputField = document.getElementById(`${type}-input-${index}`);
            const newValue = inputField.value.trim();
            const dbKey = avatarId.replace('.', '_');

            if (type === 'name') {
                const currentNameInDB = localShopNames[dbKey];
                if (newValue === '') {
                    if (currentNameInDB !== undefined) db.ref('shopItemNames/' + dbKey).remove().then(() => renderAdminShopPage());
                    else renderAdminShopPage(); 
                } else {
                    if (newValue !== currentNameInDB) db.ref('shopItemNames/' + dbKey).set(newValue).then(() => renderAdminShopPage());
                    else renderAdminShopPage(); 
                }
            } else if (type === 'price') {
                const currentPriceInDB = localShopPrices[dbKey] !== undefined ? localShopPrices[dbKey] : 1;
                let parsedPrice = parseInt(newValue, 10);
                
                if (isNaN(parsedPrice) || parsedPrice < 0) parsedPrice = 1;

                if (parsedPrice !== currentPriceInDB) {
                    db.ref('shopItemPrices/' + dbKey).set(parsedPrice).then(() => renderAdminShopPage());
                } else {
                    renderAdminShopPage();
                }
            }
        }

        function handleEnter(event, avatarId, index, type) {
            if(event.key === 'Enter') {
                saveSingleData(event, avatarId, index, type);
            }
        }

        function saveShopItems() {
            db.ref('shopItems').set(tempShopItems);
            showPage('admin-menu-page');
        }

        function checkStudentLogin() {
            const inputId = document.getElementById('student-id').value.trim();
            const inputPw = document.getElementById('student-pw').value.trim();
            const account = localStudentAccounts[inputId];

            if (account && account.pw === inputPw) {
                currentUser = inputId;
                myCurrentAvatar = account.avatarId || DEFAULT_AVATARS[0];
                
                if (!account.ownedAvatars) db.ref('studentAccounts/' + currentUser).update({ ownedAvatars: DEFAULT_AVATARS });
                if (account.gems === undefined) db.ref('studentAccounts/' + currentUser).update({ gems: 10 });

                document.getElementById('welcome-message').innerText = `환영합니다, ${inputId}님! ✨`;
                
                const myOnlineRef = db.ref('onlineUsers/' + currentUser);
                myOnlineRef.set({ avatarId: myCurrentAvatar });
                myOnlineRef.onDisconnect().remove(); 

                showPage('student-lobby-page');
                renderOnlineUsers(); 
            } else {
                alert('아이디 또는 비밀번호가 틀렸습니다.');
            }
        }

        function logoutStudent() {
            if (currentUser) {
                db.ref('onlineUsers/' + currentUser).remove();
                currentUser = null;
            }
            showPage('main-page');
        }

        function renderOnlineUsers() {
            const listDiv = document.getElementById('online-users-list');
            listDiv.innerHTML = '';
            const ids = Object.keys(localOnlineUsers);
            if (ids.length === 0) {
                listDiv.innerHTML = '<p style="color: #888; font-size: 18px;">현재 대기실에 아무도 없습니다.</p>'; return;
            }
            ids.forEach(id => {
                const user = localOnlineUsers[id];
                const userDiv = document.createElement('div');
                userDiv.className = 'online-user-item';
                const isMe = (id === currentUser) ? '<span style="color: #ff9800;">(나)</span>' : '';
                userDiv.innerHTML = `<img src="${user.avatarId}" alt="아바타" class="online-user-avatar"><span>${id} ${isMe}</span>`;
                listDiv.appendChild(userDiv);
            });
        }

        function showStudentShopPage() {
            renderStudentShop();
            showPage('student-shop-page');
        }

        function renderStudentShop() {
            const listDiv = document.getElementById('student-shop-list');
            listDiv.innerHTML = '';

            const myGems = localStudentAccounts[currentUser]?.gems || 0;
            document.getElementById('my-gems-display').innerText = `내 보석: 💎 ${myGems}`;

            if (localShopItems.length === 0) {
                listDiv.innerHTML = '<p style="color: #888; font-size: 18px; grid-column: 1 / -1;">현재 등록된 상품이 없습니다.</p>';
                return;
            }

            const myOwnedAvatars = localStudentAccounts[currentUser]?.ownedAvatars || DEFAULT_AVATARS;

            localShopItems.forEach(avatarId => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'avatar-item';
                
                const dbKey = avatarId.replace('.', '_');
                const avatarName = localShopNames[dbKey] || `${avatarId.split('.')[0]}번 아바타`;
                const avatarPrice = localShopPrices[dbKey] !== undefined ? localShopPrices[dbKey] : 1;
                
                const nameText = `<span style="font-size: 18px; color: #333; margin-top: 8px;">${avatarName}</span>`;
                
                if (myOwnedAvatars.includes(avatarId)) {
                    itemDiv.innerHTML = `
                        <img src="${avatarId}" alt="아바타" style="opacity: 0.5;">
                        ${nameText}
                        <div class="owned-tag">보유 중</div>
                    `;
                } else {
                    itemDiv.innerHTML = `
                        <img src="${avatarId}" alt="아바타">
                        ${nameText}
                        <button class="buy-btn" onclick="buyAvatar('${avatarId}')">💎 ${avatarPrice} 구입하기</button>
                    `;
                }
                listDiv.appendChild(itemDiv);
            });
        }

        function buyAvatar(avatarId) {
            const dbKey = avatarId.replace('.', '_');
            const price = localShopPrices[dbKey] !== undefined ? localShopPrices[dbKey] : 1;
            
            let myOwnedAvatars = localStudentAccounts[currentUser]?.ownedAvatars || DEFAULT_AVATARS;
            let myGems = localStudentAccounts[currentUser]?.gems || 0;

            if (myOwnedAvatars.includes(avatarId)) return alert('이미 보유한 아바타입니다.');
            
            if (myGems < price) {
                alert('보석이 부족합니다!');
                return;
            }

            myGems -= price; 
            myOwnedAvatars.push(avatarId); 
            
            db.ref('studentAccounts/' + currentUser).update({ 
                ownedAvatars: myOwnedAvatars,
                gems: myGems
            });
            
            alert('아바타를 성공적으로 구입했습니다! 보관함에서 확인해보세요. 🎉');
        }

        function showStoragePage() { 
            tempSelectedAvatar = myCurrentAvatar; 
            renderAvatarList(); 
            showPage('storage-page'); 
        }

        function renderAvatarList() {
            const listDiv = document.getElementById('avatar-list');
            listDiv.innerHTML = '';
            
            const myOwnedAvatars = localStudentAccounts[currentUser]?.ownedAvatars || DEFAULT_AVATARS;
            
            myOwnedAvatars.forEach(avatarId => {
                const avatarDiv = document.createElement('div');
                avatarDiv.className = 'avatar-item';
                
                if (avatarId === tempSelectedAvatar) {
                    avatarDiv.classList.add('selected');
                }
                
                avatarDiv.onclick = () => {
                    tempSelectedAvatar = avatarId;
                    renderAvatarList(); 
                };
                
                let avatarName = '';
                if(avatarId === 'image_0.png') avatarName = '기본 남자';
                else if(avatarId === 'image_1.png') avatarName = '기본 여자';
                else {
                    avatarName = localShopNames[avatarId.replace('.', '_')] || `${avatarId.split('.')[0]}번 아바타`;
                }

                avatarDiv.innerHTML = `
                    <img src="${avatarId}" alt="아바타">
                    <p style="font-size: 18px; color: #333; margin-top: 15px;">${avatarName}</p>
                `;
                listDiv.appendChild(avatarDiv);
            });
        }

        function applySelectedAvatar() {
            if (!tempSelectedAvatar) return;
            
            myCurrentAvatar = tempSelectedAvatar;
            db.ref('studentAccounts/' + currentUser).update({ avatarId: tempSelectedAvatar });
            db.ref('onlineUsers/' + currentUser).update({ avatarId: tempSelectedAvatar });
            
            showPage('student-lobby-page');
        }
    </script>
</body>
</html>
